<!doctype html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RestoPilot 360 — Dashboard</title>
  <style>
    :root{
      --green:#0F4F3A; --green-dark:#0B2E24; --cream:#F7F3EA; --sand:#D6B06D;
      --paper:#FFFCF7; --danger:#B42318; --warning:#B54708; --success:#067647;
      --ink:#12231d; --muted:#66746d; --line:#E6DED0; --soft:#F1EBDD; --shadow:0 18px 45px rgba(15,79,58,.10);
    }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 10% -5%,rgba(214,176,109,.25),transparent 30%),linear-gradient(180deg,var(--cream),#fff);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--ink)}
    body.rtl{direction:rtl;font-family:Tahoma,Arial,"Noto Kufi Arabic","Noto Sans Arabic",sans-serif}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(255,252,247,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1480px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .brand{display:flex;align-items:center;gap:14px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(145deg,var(--green),var(--green-dark));display:grid;place-items:center;color:var(--sand);font-weight:900;box-shadow:var(--shadow)}
    .brand h1{margin:0;font-size:22px;line-height:1.1}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.switch{background:#EFE6D7;border:1px solid var(--line);border-radius:999px;padding:6px;display:flex;gap:5px;box-shadow:var(--shadow)}
    .switch button{border:0;border-radius:999px;padding:11px 20px;background:transparent;color:var(--green-dark);font-weight:800;cursor:pointer}.switch button.active{background:var(--green);color:#fff}.meta{text-align:end;color:var(--muted);font-size:12px}.meta b{display:block;color:var(--green-dark);font-size:13px}
    .wrap{max-width:1480px;margin:0 auto;padding:28px 24px 45px}.hero{background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:32px;padding:34px;display:grid;grid-template-columns:1.5fr .7fr;gap:24px;color:#fff;box-shadow:var(--shadow);overflow:hidden;position:relative}.hero:before{content:"";position:absolute;width:420px;height:420px;border-radius:50%;background:rgba(214,176,109,.16);left:-120px;bottom:-210px}.rtl .hero:before{left:auto;right:-120px}.hero>*{position:relative}.eyebrow{color:#E9D08D;font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.hero h2{font-size:36px;line-height:1.12;margin:12px 0}.hero p{color:rgba(255,255,255,.75);line-height:1.7;margin:0}.score-card{background:rgba(255,252,247,.96);color:var(--green-dark);border-radius:28px;padding:28px}.score-card .score{font-size:58px;font-weight:950;letter-spacing:-.06em}.score-card p{color:var(--muted);font-weight:700}.grid{display:grid;gap:18px}.kpis{grid-template-columns:repeat(6,1fr);margin:22px 0}.card{background:rgba(255,252,247,.92);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.kpi small{color:var(--muted);font-weight:900}.kpi .value{font-size:28px;font-weight:950;margin:12px 0 6px;letter-spacing:-.04em}.kpi .sub{font-size:13px;color:var(--muted)}.positive{color:var(--success)}.negative{color:var(--danger)}.warningText{color:var(--warning)}
    .main{grid-template-columns:1.15fr .85fr}.section-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}.section-title h3{margin:0;font-size:22px}.section-title span{color:var(--muted);font-size:13px}.insight{display:grid;grid-template-columns:46px 1fr;gap:14px;padding:16px;border:1px solid var(--line);border-radius:18px;margin:12px 0;background:#fffdf8}.rtl .insight{grid-template-columns:1fr 46px}.rtl .insight .icon{grid-column:2}.rtl .insight .txt{grid-column:1;grid-row:1}.icon{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;font-weight:900}.success .icon{background:#E7F6EF;color:var(--success)}.danger .icon{background:#FEE2E2;color:var(--danger)}.warn .icon{background:#FFF4D6;color:var(--warning)}.insight h4{margin:0 0 6px}.insight p{margin:0;color:var(--muted);line-height:1.55}.bars .bar-row{margin:16px 0}.bar-head{display:flex;justify-content:space-between;color:var(--muted);font-weight:800;font-size:14px}.track{height:12px;background:#EEE6D8;border-radius:999px;margin-top:9px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--green),var(--sand));border-radius:999px}.two{grid-template-columns:1fr 1fr;margin-top:18px}.three{grid-template-columns:repeat(3,1fr);margin-top:18px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:13px 10px;border-bottom:1px solid var(--line);text-align:start}th{color:var(--muted);font-weight:900}.badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-weight:900;font-size:12px;white-space:nowrap}.b-ok{background:#D1FAE5;color:#065F46}.b-warn{background:#FFF4D6;color:#92400E}.b-danger{background:#FEE2E2;color:#991B1B}.b-neutral{background:#ECEFF1;color:#374151}.footer{text-align:center;color:var(--muted);margin:28px 0 0;font-size:13px}.empty{color:var(--muted);padding:18px;background:#fffdf8;border:1px dashed var(--line);border-radius:16px}.loading{min-height:55vh;display:grid;place-items:center;color:var(--green-dark);font-weight:900}.error{background:#FEE2E2;color:#991B1B;padding:16px;border-radius:18px;margin:20px 0;font-weight:800}
    @media(max-width:1100px){.hero,.main,.two,.three{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.topbar-inner{flex-direction:column;align-items:stretch}.meta{text-align:start}.hero{padding:24px;border-radius:24px}.hero h2{font-size:28px}.kpis{grid-template-columns:1fr}.wrap{padding:18px 14px}.card{padding:16px;overflow:auto}.score-card .score{font-size:46px}}
  </style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner">
    <div class="brand"><div class="logo">R</div><div><h1 id="brandTitle">RestoPilot 360</h1><p id="brandSub">Dashboard propriétaire — Français / العربية</p></div></div>
    <div class="switch"><button id="btnFr" class="active" onclick="setLang('fr')">Français</button><button id="btnAr" onclick="setLang('ar')">العربية</button></div>
    <div class="meta"><b id="updatedLabel">Mise à jour</b><span id="updatedAt">—</span></div>
  </div></div>
  <main class="wrap"><div id="app" class="loading">Chargement des données…</div></main>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzITV2MPFWytiNV8K_ZhDXy7vmbiT-xJuViWzH-qpUxJVqyv9ydn4wPS5i8cRPejweK/exec?token=restopilot360_hamza_2026&action=full";
let DATA=null; let LANG=localStorage.getItem('rp360_lang') || 'fr';
const T={
 fr:{sub:'Dashboard propriétaire — Français / العربية',updated:'Mise à jour',loading:'Chargement des données…',error:'Erreur de chargement',heroK:'BRIEF PROPRIÉTAIRE',heroTitle:'Piloter le restaurant sans se perdre dans les feuilles.',heroText:'Vue claire sur le chiffre d’affaires, le stock, les dépenses, les commandes, les documents à valider et les actions prioritaires.',score:'Score de contrôle',scoreGood:'Contrôle fort : les indicateurs critiques sont maîtrisés.',scoreMid:'Contrôle moyen : certains points demandent votre attention.',scoreBad:'Contrôle faible : actions urgentes nécessaires.',ca:'CA du mois',est:'Estimation fin de mois',res:'Résultat estimé',stock:'Valeur stock',food:'Food cost',docs:'Documents à valider',insights:'Analyse naturelle',actions:'Actions prioritaires',payments:'Répartition des paiements',stockAlerts:'Stock & alertes',expenses:'Dépenses par catégorie',suppliers:'Fournisseurs / achats',orders:'Bons de commande',noData:'Aucune donnée',footer:'RestoPilot 360 — Système de pilotage restaurant',product:'Produit',theo:'Stock théorique',min:'Seuil min.',cover:'Couverture',status:'Statut',action:'Action',amount:'Montant',supplier:'Fournisseur',priority:'Priorité',why:'Pourquoi',category:'Catégorie'},
 ar:{sub:'لوحة قيادة المالك — العربية / Français',updated:'آخر تحديث',loading:'جاري تحميل البيانات…',error:'خطأ في تحميل البيانات',heroK:'تقرير المالك',heroTitle:'قيادة المطعم بوضوح بدون تعقيد.',heroText:'رؤية واضحة لرقم المعاملات والمخزون والمصاريف وطلبات الشراء والوثائق التي تنتظر التحقق والإجراءات ذات الأولوية.',score:'مؤشر التحكم',scoreGood:'تحكم قوي: المؤشرات المهمة تحت السيطرة.',scoreMid:'تحكم متوسط: بعض النقاط تحتاج إلى انتباه.',scoreBad:'تحكم ضعيف: يجب القيام بإجراءات عاجلة.',ca:'رقم معاملات الشهر',est:'التوقعات لنهاية الشهر',res:'النتيجة التقديرية',stock:'قيمة المخزون',food:'تكلفة المواد',docs:'وثائق في انتظار التحقق',insights:'تحليل مبسط',actions:'الإجراءات ذات الأولوية',payments:'توزيع المداخيل',stockAlerts:'المخزون والتنبيهات',expenses:'المصاريف حسب الفئة',suppliers:'الموردون والمشتريات',orders:'طلبات الشراء',noData:'لا توجد بيانات',footer:'ريستو بايلوت 360 — نظام قيادة ومراقبة المطعم',product:'المنتج',theo:'المخزون النظري',min:'الحد الأدنى',cover:'التغطية',status:'الحالة',action:'الإجراء',amount:'المبلغ',supplier:'المورد',priority:'الأولوية',why:'السبب',category:'الفئة'}
};
const statusAR={'OK':'جيد','Rupture':'نفاد المخزون','Sous seuil':'تحت الحد الأدنى','Critique':'حرج','À valider':'في انتظار الموافقة','A valider':'في انتظار الموافقة','Validé':'تمت الموافقة','Valide':'تمت الموافقة','Envoyé fournisseur':'أرسل إلى المورد','Reçu':'تم الاستلام','Annulé':'ملغى','Non payé':'غير مؤدى','Payé':'مؤدى','À corriger':'يحتاج إلى تصحيح','A corriger':'يحتاج إلى تصحيح','Urgente':'عاجلة','Haute':'عالية','Normale':'عادية'};
function tr(k){return T[LANG][k]||k} function safeNumber(v){const n=Number(String(v??0).replace(/[^0-9.-]/g,''));return isNaN(n)?0:n}
function formatMAD(v){return new Intl.NumberFormat(LANG==='ar'?'ar-MA':'fr-MA',{maximumFractionDigits:0}).format(safeNumber(v))+' MAD'}
function formatPercent(v){let n=safeNumber(v); if(n<=1)n=n*100; return new Intl.NumberFormat(LANG==='ar'?'ar-MA':'fr-MA',{maximumFractionDigits:1}).format(n)+'%'}
function get(obj,path,def=0){return path.split('.').reduce((o,k)=>o&&o[k]!==undefined?o[k]:undefined,obj)??def}
function arr(v){return Array.isArray(v)?v:[]} function label(v){return LANG==='ar'?(statusAR[v]||v||tr('noData')):(v||tr('noData'))}
function badgeClass(v){v=String(v||'').toLowerCase(); if(v.includes('rupture')||v.includes('corriger')||v.includes('urgent')||v.includes('نفاد'))return 'b-danger'; if(v.includes('seuil')||v.includes('critique')||v.includes('valider')||v.includes('haute')||v.includes('حرج'))return 'b-warn'; if(v.includes('ok')||v.includes('valid')||v.includes('reçu')||v.includes('جيد'))return 'b-ok'; return 'b-neutral'}
async function fetchData(){const r=await fetch(API_URL,{cache:'no-store'}); if(!r.ok)throw new Error('HTTP '+r.status); return await r.json()}
function setLang(l){LANG=l;localStorage.setItem('rp360_lang',l);document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.body.classList.toggle('rtl',l==='ar');document.getElementById('btnFr').classList.toggle('active',l==='fr');document.getElementById('btnAr').classList.toggle('active',l==='ar');document.getElementById('brandTitle').textContent=l==='ar'?'ريستو بايلوت 360':'RestoPilot 360';document.getElementById('brandSub').textContent=tr('sub');document.getElementById('updatedLabel').textContent=tr('updated'); if(DATA)renderDashboard(DATA); else document.getElementById('app').textContent=tr('loading')}
function scoreMessage(s){return s>=80?tr('scoreGood'):s>=60?tr('scoreMid'):tr('scoreBad')}
function renderDashboard(data){const s=data.summary||{};document.getElementById('updatedAt').textContent=new Date(data.generatedAt||Date.now()).toLocaleString(LANG==='ar'?'ar-MA':'fr-FR');document.getElementById('app').className='';document.getElementById('app').innerHTML=`
<section class="hero"><div><div class="eyebrow">${tr('heroK')}</div><h2>${tr('heroTitle')}</h2><p>${tr('heroText')}</p></div><div class="score-card"><div class="eyebrow">${tr('score')}</div><div class="score">${safeNumber(s.scoreControle)}/100</div><p>${scoreMessage(s.scoreControle||0)}</p></div></section>
<section class="grid kpis">${renderKpis(data)}</section><section class="grid main"><div class="card"><div class="section-title"><h3>${tr('insights')}</h3><span>${LANG==='ar'?'لغة مبسطة':'Langage naturel'}</span></div>${renderInsights(data)}</div><div class="card"><div class="section-title"><h3>${tr('payments')}</h3><span>${formatMAD(s.caTotal)}</span></div>${renderPayments(data)}</div></section>
<section class="grid two"><div class="card"><div class="section-title"><h3>${tr('actions')}</h3></div>${renderActions(data)}</div><div class="card"><div class="section-title"><h3>${tr('stockAlerts')}</h3></div>${renderStock(data)}</div></section>
<section class="grid three"><div class="card"><div class="section-title"><h3>${tr('expenses')}</h3></div>${renderExpenses(data)}</div><div class="card"><div class="section-title"><h3>${tr('suppliers')}</h3></div>${renderSuppliers(data)}</div><div class="card"><div class="section-title"><h3>${tr('orders')}</h3></div>${renderPurchaseOrders(data)}</div></section>
<div class="footer">${tr('footer')}</div>`}
function renderKpis(data){const s=data.summary||{};const cards=[[tr('ca'),formatMAD(s.caTotal),''],[tr('est'),formatMAD(s.caEstimeFinMois),''],[tr('res'),formatMAD(s.resultatEstime),safeNumber(s.resultatEstime)>=0?'positive':'negative'],[tr('stock'),formatMAD(s.valeurStock),''],[tr('food'),formatPercent(s.foodCost),safeNumber(s.foodCost)>.35?'warningText':'positive'],[tr('docs'),safeNumber(s.scannerPending),'']];return cards.map(c=>`<div class="card kpi"><small>${c[0]}</small><div class="value ${c[2]}">${c[1]}</div><div class="sub">${c[0]}</div></div>`).join('')}
function renderInsights(data){let items=arr(get(data,'insights.'+LANG,[])); if(!items.length&&LANG==='ar'){const s=data.summary||{};items=[{type:'success',title:'ملخص سريع',text:`رقم معاملات الشهر هو ${formatMAD(s.caTotal)} والنتيجة التقديرية هي ${formatMAD(s.resultatEstime)} وقيمة المخزون هي ${formatMAD(s.valeurStock)}.`}]}; if(!items.length)return `<div class="empty">${tr('noData')}</div>`;return items.map(x=>`<div class="insight ${x.type==='danger'?'danger':x.type==='warning'?'warn':'success'}"><div class="icon">${x.type==='danger'?'!':x.type==='warning'?'~':'✓'}</div><div class="txt"><h4>${x.title||''}</h4><p>${x.text||x.message||''}</p></div></div>`).join('')}
function renderPayments(data){const rows=arr(data.payments); if(!rows.length)return `<div class="empty">${tr('noData')}</div>`;return `<div class="bars">${rows.map(r=>{const p=safeNumber(r.percent)<=1?safeNumber(r.percent)*100:safeNumber(r.percent);return `<div class="bar-row"><div class="bar-head"><span>${label(r.label)}</span><b>${formatMAD(r.value)} · ${formatPercent(p)}</b></div><div class="track"><div class="fill" style="width:${Math.min(100,p)}%"></div></div></div>`}).join('')}</div>`}
function renderActions(data){const rows=arr(data.actions); if(!rows.length)return `<div class="empty">${tr('noData')}</div>`;return `<table><thead><tr><th>${tr('priority')}</th><th>${tr('action')}</th><th>${tr('status')}</th></tr></thead><tbody>${rows.slice(0,8).map(r=>`<tr><td><span class="badge ${badgeClass(r.priority)}">${label(r.priority)}</span></td><td><b>${LANG==='ar'?translateAction(r.action):r.action}</b><br><small>${LANG==='ar'?translateWhy(r.why):r.why||''}</small></td><td><span class="badge ${badgeClass(r.status)}">${label(r.status)}</span></td></tr>`).join('')}</tbody></table>`}
function renderStock(data){const rows=arr(data.stockAlerts).length?arr(data.stockAlerts):arr(data.stock).filter(x=>String(x.statut||x.Statut_Stock||'').toLowerCase()!=='ok').slice(0,8); if(!rows.length)return `<div class="empty">${tr('noData')}</div>`;return `<table><thead><tr><th>${tr('product')}</th><th>${tr('theo')}</th><th>${tr('cover')}</th><th>${tr('status')}</th></tr></thead><tbody>${rows.slice(0,8).map(r=>`<tr><td>${r.produit||r.Produit||''}</td><td>${safeNumber(r.stockTheorique||r.Stock_Theorique)}</td><td>${safeNumber(r.couvertureJours||r.Couverture_Jours)}</td><td><span class="badge ${badgeClass(r.statut||r.Statut_Stock)}">${label(r.statut||r.Statut_Stock)}</span></td></tr>`).join('')}</tbody></table>`}
function renderExpenses(data){const rows=arr(data.depensesByCategory); if(!rows.length)return `<div class="empty">${tr('noData')}</div>`;return `<table><thead><tr><th>${tr('category')}</th><th>${tr('amount')}</th></tr></thead><tbody>${rows.slice(0,8).map(r=>`<tr><td>${r.label||r.category||''}</td><td><b>${formatMAD(r.value||r.montant)}</b></td></tr>`).join('')}</tbody></table>`}
function renderSuppliers(data){const rows=arr(data.fournisseurs); if(!rows.length)return `<div class="empty">${tr('noData')}</div>`;return `<table><thead><tr><th>${tr('supplier')}</th><th>${tr('amount')}</th></tr></thead><tbody>${rows.slice(0,8).map(r=>`<tr><td>${r.label||r.fournisseur||''}</td><td><b>${formatMAD(r.value||r.total)}</b></td></tr>`).join('')}</tbody></table>`}
function renderPurchaseOrders(data){const rows=arr(data.bonsCommande||data.purchaseOrders||data.commandes); if(!rows.length)return `<div class="empty">${tr('noData')}</div>`;return `<table><thead><tr><th>${tr('supplier')}</th><th>${tr('amount')}</th><th>${tr('status')}</th></tr></thead><tbody>${rows.slice(0,8).map(r=>`<tr><td>${r.Fournisseur||r.fournisseur||''}</td><td>${formatMAD(r.Montant_Estime_TTC||r.montant||r.value)}</td><td><span class="badge ${badgeClass(r.Statut_Commande||r.status)}">${label(r.Statut_Commande||r.status)}</span></td></tr>`).join('')}</tbody></table>`}
function translateAction(v){if(!v)return '';const m={'Traiter les alertes stock':'معالجة تنبيهات المخزون','Valider les documents scannés':'التحقق من الوثائق الممسوحة','Analyser le coût matière':'مراجعة تكلفة المواد','Contrôler les écarts inventaire':'مراقبة فروقات الجرد','Continuer le suivi quotidien':'مواصلة التتبع اليومي'};return m[v]||v}
function translateWhy(v){if(!v)return '';return String(v).replace('produit(s) sont sous seuil ou en rupture','منتجات تحت الحد الأدنى أو في حالة نفاد').replace('document(s) attendent validation avant impact stock','وثائق تنتظر التحقق قبل التأثير على المخزون').replace('Food cost supérieur à l’objectif','تكلفة المواد أعلى من الهدف').replace('Écart valorisé','فرق بقيمة')}
(async()=>{setLang(LANG);try{DATA=await fetchData(); if(DATA && DATA.success===false)throw new Error(DATA.error||'API'); renderDashboard(DATA)}catch(e){document.getElementById('app').className='';document.getElementById('app').innerHTML=`<div class="error">${tr('error')} : ${e.message}</div>`}})();
</script>
</body>
</html>
