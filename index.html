  <style>
    :root{--green:#0F4F3A;--green-dark:#0B2E24;--cream:#F7F3EA;--sand:#D6B06D;--paper:#FFFCF7;--ink:#071914;--muted:#66756f;--line:#E9E1D4;--success:#067647;--success-bg:#D1FAE5;--warning:#B54708;--warning-bg:#FFF4D6;--danger:#B42318;--danger-bg:#FEE2E2;--shadow:0 18px 45px rgba(15,79,58,.10);--radius:24px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(15,79,58,.08),transparent 26%),linear-gradient(180deg,#FFFCF7 0%,#F7F3EA 100%);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh}body[dir=rtl]{font-family:Tahoma,Arial,sans-serif}.topbar{position:sticky;top:0;z-index:50;display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;padding:22px 30px;background:rgba(255,252,247,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(214,176,109,.24)}.brand{display:flex;gap:14px;align-items:center}.logo{width:52px;height:52px;border-radius:16px;background:var(--green);color:var(--sand);display:grid;place-items:center;font-weight:900;box-shadow:var(--shadow)}.brand h1{margin:0;font-size:25px;line-height:1.1}.brand p{margin:4px 0 0;color:var(--muted);font-size:14px}.switch{display:flex;gap:8px;align-items:center;justify-content:center;background:#EFE6D6;padding:7px;border-radius:999px;border:1px solid #E4D6C1}.switch button{border:0;border-radius:999px;padding:13px 24px;font-weight:900;cursor:pointer;color:var(--green-dark);background:transparent;transition:.2s}.switch button.active{background:var(--green);color:white;box-shadow:0 8px 18px rgba(15,79,58,.22)}.updated{text-align:right;color:var(--muted);font-size:13px}body[dir=rtl] .updated{text-align:left}.updated strong{display:block;color:var(--green-dark)}.wrap{max-width:1480px;margin:0 auto;padding:30px}.hero{display:grid;grid-template-columns:1.9fr .8fr;gap:28px;align-items:stretch;background:linear-gradient(135deg,#0B2E24 0%,#0F4F3A 100%);color:white;border-radius:32px;padding:38px;position:relative;overflow:hidden;box-shadow:var(--shadow)}.hero:before{content:"";position:absolute;width:360px;height:360px;border-radius:50%;background:rgba(214,176,109,.18);left:-120px;bottom:-150px}body[dir=rtl] .hero:before{left:auto;right:-120px}.hero>*{position:relative}.eyebrow{color:#F3D98F;text-transform:uppercase;font-size:13px;font-weight:900;letter-spacing:.12em}body[dir=rtl] .eyebrow{letter-spacing:0}.hero h2{font-size:38px;line-height:1.08;margin:16px 0 14px;max-width:850px}.hero p{font-size:17px;color:#D7E8E1;margin:0;line-height:1.65}.scorebox{background:rgba(255,252,247,.95);color:var(--green-dark);border-radius:28px;padding:30px;display:flex;flex-direction:column;justify-content:center;min-height:170px}.scorebox .label{color:var(--sand);font-weight:900;text-transform:uppercase;font-size:13px;letter-spacing:.12em}.score{font-size:64px;font-weight:950;line-height:1;margin:12px 0}.scoremsg{color:#566963;font-weight:800}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:18px;margin:24px 0}.card{background:rgba(255,252,247,.88);border:1px solid rgba(214,176,109,.28);border-radius:var(--radius);padding:22px;box-shadow:0 12px 28px rgba(15,79,58,.06)}.kpi .name{font-size:13px;color:#61716b;font-weight:900;margin-bottom:14px}.kpi .value{font-size:28px;font-weight:950;line-height:1.1}.kpi .hint{font-size:13px;color:var(--muted);margin-top:10px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:20px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:20px}.section-title{display:flex;justify-content:space-between;gap:16px;align-items:baseline;margin-bottom:16px}.section-title h3{font-size:24px;margin:0}.section-title span{color:var(--muted);font-size:13px}.empty{padding:18px;border:1px dashed var(--line);border-radius:16px;color:var(--muted);background:rgba(255,252,247,.55)}.insight{display:flex;gap:14px;border:1px solid var(--line);padding:16px;border-radius:18px;margin-bottom:12px;background:#fffdfa}body[dir=rtl] .insight{flex-direction:row-reverse}.icon{width:42px;height:42px;flex:0 0 42px;border-radius:14px;display:grid;place-items:center;font-weight:900}.icon.success{background:var(--success-bg);color:var(--success)}.icon.warning{background:var(--warning-bg);color:var(--warning)}.icon.danger{background:var(--danger-bg);color:var(--danger)}.insight strong{display:block;margin-bottom:5px}.insight p{margin:0;color:#65746e;line-height:1.55}table{width:100%;border-collapse:collapse}th,td{padding:14px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:middle}body[dir=rtl] th,body[dir=rtl] td{text-align:right}th{color:#62736d;font-weight:950}.badge{display:inline-flex;align-items:center;white-space:nowrap;border-radius:999px;padding:7px 11px;font-weight:950;font-size:12px;background:#EEF2F1;color:#33443e}.badge.ok{background:var(--success-bg);color:var(--success)}.badge.warn{background:var(--warning-bg);color:var(--warning)}.badge.danger{background:var(--danger-bg);color:var(--danger)}.bar{height:12px;border-radius:999px;background:#E7DED0;overflow:hidden}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--sand));min-width:2px}.footer{padding:30px;text-align:center;color:var(--muted);font-size:13px}.loading{min-height:65vh;display:grid;place-items:center;text-align:center;color:var(--green-dark)}.spinner{width:44px;height:44px;border-radius:50%;border:4px solid #E8DDC8;border-top-color:var(--green);animation:spin 1s linear infinite;margin:0 auto 16px}@keyframes spin{to{transform:rotate(360deg)}}.error{background:var(--danger-bg);color:var(--danger);border:1px solid #F2B8B5;border-radius:18px;padding:18px;margin:24px 0}@media(max-width:1100px){.topbar{grid-template-columns:1fr;justify-items:start}.switch{justify-self:start}.updated{text-align:left}.hero,.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}}@media(max-width:640px){.wrap{padding:18px}.topbar{padding:16px}.hero{padding:24px;border-radius:24px}.hero h2{font-size:28px}.kpis{grid-template-columns:1fr}.card{padding:18px}table{display:block;overflow-x:auto;white-space:nowrap}}

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzITV2MPFWytiNV8K_ZhDXy7vmbiT-xJuViWzH-qpUxJVqyv9ydn4wPS5i8cRPejweK/exec?token=restopilot360_hamza_2026&action=full";
let LANG=localStorage.getItem("rp360_lang")||"fr";let DATA=null;
const T={fr:{brand:"RestoPilot 360",sub:"Dashboard propriétaire — Français / العربية",updated:"Mise à jour",eye:"Brief propriétaire",title:"Piloter le restaurant sans se perdre dans les feuilles.",subtitle:"Vue claire sur le chiffre d’affaires, le stock, les dépenses, les commandes, les documents à valider et les actions prioritaires.",score:"Score de contrôle",k_ca:"CA du mois",k_est:"Estimation fin de mois",k_res:"Résultat estimé",k_stock:"Valeur stock",k_food:"Food cost",k_docs:"Documents à valider",analysis:"Analyse naturelle",natural:"Langage naturel",payments:"Répartition des paiements",actions:"Actions prioritaires",stock:"Stock & alertes",expenses:"Dépenses par catégorie",suppliers:"Fournisseurs / achats",orders:"Bons de commande",noData:"Aucune donnée",loadErr:"Erreur de chargement des données",priority:"Priorité",action:"Action",why:"Pourquoi",status:"Statut",product:"Produit",theo:"Stock théorique",cover:"Couverture",category:"Catégorie",amount:"Montant",supplier:"Fournisseur",period:"Période analysée",footer:"RestoPilot 360 — Système de pilotage restaurant",scoreGood:"Contrôle fort : les indicateurs critiques sont maîtrisés.",scoreMid:"Contrôle moyen : quelques points nécessitent un suivi.",scoreLow:"Contrôle faible : actions urgentes nécessaires."},ar:{brand:"ريستو بايلوت 360",sub:"لوحة قيادة المالك — العربية / Français",updated:"آخر تحديث",eye:"ملخص المالك",title:"قيادة المطعم بوضوح دون الضياع في الجداول.",subtitle:"رؤية واضحة لرقم المعاملات، المخزون، المصاريف، الطلبات، الوثائق التي تنتظر التحقق، والإجراءات ذات الأولوية.",score:"مؤشر التحكم",k_ca:"رقم معاملات الشهر",k_est:"التوقعات لنهاية الشهر",k_res:"النتيجة التقديرية",k_stock:"قيمة المخزون",k_food:"تكلفة المواد",k_docs:"وثائق في انتظار التحقق",analysis:"تحليل مبسط",natural:"لغة مبسطة",payments:"توزيع المداخيل",actions:"الإجراءات ذات الأولوية",stock:"المخزون والتنبيهات",expenses:"المصاريف حسب الفئة",suppliers:"الموردون والمشتريات",orders:"طلبات الشراء",noData:"لا توجد بيانات",loadErr:"خطأ في تحميل البيانات",priority:"الأولوية",action:"الإجراء",why:"السبب",status:"الحالة",product:"المنتج",theo:"المخزون النظري",cover:"التغطية",category:"الفئة",amount:"المبلغ",supplier:"المورد",period:"الفترة المحللة",footer:"ريستو بايلوت 360 — نظام قيادة ومراقبة المطعم",scoreGood:"تحكم قوي: المؤشرات المهمة تحت السيطرة.",scoreMid:"تحكم متوسط: بعض النقاط تحتاج إلى متابعة.",scoreLow:"تحكم ضعيف: إجراءات عاجلة ضرورية."}};
function safeNumber(v){if(v===null||v===undefined||v==="")return 0;if(typeof v==="number")return isFinite(v)?v:0;const n=parseFloat(String(v).replace(/\s/g,"").replace(",",".").replace(/[^\d.-]/g,""));return isNaN(n)?0:n}
function formatMAD(v){return Math.round(safeNumber(v)).toLocaleString(LANG==="ar"?"ar-MA":"fr-FR")+" MAD"}function formatPercent(v){const n=safeNumber(v);const p=n<=1?n*100:n;return(Math.round(p*10)/10).toLocaleString(LANG==="ar"?"ar-MA":"fr-FR")+"%"}function fmtDate(v){const d=new Date(v||Date.now());return isNaN(d)?String(v):d.toLocaleString(LANG==="ar"?"ar-MA":"fr-FR")}function monthKey(v){if(!v)return"";const d=new Date(v);if(isNaN(d))return"";return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}function maxMonth(rows,key){const months=(rows||[]).map(r=>monthKey(r[key]||r.Date||r.Date_Commande)).filter(Boolean).sort();return months.length?months[months.length-1]:""}function rowsInMonth(rows,key,m){if(!m)return rows||[];return(rows||[]).filter(r=>monthKey(r[key]||r.Date||r.Date_Commande)===m||String(r.Mois||"").slice(0,7)===m)}function summaryVal(data,names,fallback=0){const s=data.summary||{};for(const n of names){if(s[n]&&typeof s[n]==="object"&&"value" in s[n])return safeNumber(s[n].value);if(n in s)return safeNumber(s[n])}return fallback}function textVal(obj,names,fallback=""){if(!obj)return fallback;for(const n of names){if(obj[n]!==undefined&&obj[n]!==null&&obj[n]!=="")return obj[n]}return fallback}function sumRows(rows,names){return(rows||[]).reduce((a,r)=>a+safeNumber(textVal(r,names,0)),0)}function groupSum(rows,groupNames,valueNames){const map={};(rows||[]).forEach(r=>{const label=String(textVal(r,groupNames,T[LANG].noData));map[label]=(map[label]||0)+safeNumber(textVal(r,valueNames,0))});return Object.keys(map).map(k=>({label:k,value:map[k]})).sort((a,b)=>b.value-a.value)}
function scoreMessage(score){if(score>=80)return T[LANG].scoreGood;if(score>=60)return T[LANG].scoreMid;return T[LANG].scoreLow}function badgeClass(status){const s=String(status||"").toLowerCase();if(["ok","payé","paye","validé","valide","reçu","recu","جيد","تمت الموافقة","مؤدى"].some(x=>s.includes(x)))return"ok";if(["rupture","urgent","urgente","non payé","non paye","à corriger","a corriger","نفاد","عاجلة","غير مؤدى","تصحيح"].some(x=>s.includes(x)))return"danger";return"warn"}
function translateStatus(s){if(LANG!=="ar")return s||T.fr.noData;const map={"Rupture":"نفاد المخزون","Sous seuil":"تحت الحد الأدنى","Critique":"حرج","OK":"جيد","À valider":"في انتظار الموافقة","A valider":"في انتظار الموافقة","Validé":"تمت الموافقة","Valide":"تمت الموافقة","Envoyé fournisseur":"أرسل إلى المورد","Reçu":"تم الاستلام","Recu":"تم الاستلام","Annulé":"ملغى","Non payé":"غير مؤدى","Non paye":"غير مؤدى","Payé":"مؤدى","Paye":"مؤدى","À faire":"يجب القيام به","A faire":"يجب القيام به","À contrôler":"يحتاج إلى مراقبة","A controler":"يحتاج إلى مراقبة","Urgente":"عاجلة","Haute":"عالية","Normale":"عادية"};return map[s]||s||T.ar.noData}function translateActionText(s){if(LANG!=="ar")return s||T.fr.noData;const map={"Créer ou vérifier les bons de commande":"إنشاء أو مراجعة طلبات الشراء","Suivre les commandes ouvertes":"متابعة طلبات الشراء المفتوحة","Des produits sont en rupture, sous seuil ou critiques.":"هناك منتجات في حالة نفاد أو تحت الحد الأدنى أو حرجة.","Des bons de commande sont à valider, envoyés ou non reçus.":"هناك طلبات شراء تحتاج إلى موافقة أو متابعة حتى الاستلام.","Commander immédiatement":"اطلب فوراً","Préparer une commande":"حضّر طلب شراء","Aucune action urgente":"لا يوجد إجراء عاجل","Produit en rupture":"المنتج غير متوفر","Produit sous le seuil minimum":"المنتج تحت الحد الأدنى","Couverture stock inférieure à 2 jours":"تغطية المخزون أقل من يومين","Créé automatiquement selon alertes stock.":"تم إنشاؤه تلقائياً حسب تنبيهات المخزون."};return map[s]||s||T.ar.noData}function renderBadge(s){return`<span class="badge ${badgeClass(s)}">${translateStatus(s)}</span>`}
function computeMetrics(data){const ventes=data.ventes||[],depenses=data.depenses||[],factures=data.factures||[];const m=maxMonth(ventes,"Date")||maxMonth(depenses,"Date")||maxMonth(factures,"Date")||monthKey(data.generatedAt);const ventesM=rowsInMonth(ventes,"Date",m),depM=rowsInMonth(depenses,"Date",m),factM=rowsInMonth(factures,"Date",m);let ca=sumRows(ventesM,["CA_Total","CA total","caTotal"]);if(ca===0)ca=summaryVal(data,["Chiffre d’affaires mois","caTotal","CA du mois"],0);const achatsHT=sumRows(factM,["Montant_HT","Montant HT","HT"]);const depTTC=sumRows(depM,["Montant_TTC","Montant TTC"]);const valeurStock=sumRows(data.stock||[],["Valeur_Stock","Valeur stock","valeurStock"])||summaryVal(data,["Valeur stock théorique","valeurStock"],0);const resultat=ca-achatsHT-depTTC;const foodCost=ca?achatsHT/ca:summaryVal(data,["Food cost","foodCost"],0);const score=summaryVal(data,["Score contrôle","scoreControle"],0)||Math.max(0,Math.min(100,Math.round(100-(data.stock||[]).filter(x=>textVal(x,["Statut_Stock"])!=="OK").length*5)));const docs=summaryVal(data,["Documents à valider","scannerPending"],0)||(data.scannerPending||[]).length||0;const orderOpen=(data.bonsCommande||data.purchaseOrders||[]).filter(o=>!["Reçu","Recu","Annulé","Annule"].includes(String(textVal(o,["Statut_Commande","status"])))).length;let caEst=summaryVal(data,["Estimation CA fin de mois","caEstimeFinMois"],0);if(ca>0&&caEst===0){const days=ventesM.map(r=>new Date(r.Date).getDate()).filter(Boolean);const maxDay=days.length?Math.max(...days):new Date().getDate();const ref=ventesM[0]?new Date(ventesM[0].Date):new Date();const dim=new Date(ref.getFullYear(),ref.getMonth()+1,0).getDate();caEst=ca/Math.max(1,maxDay)*dim}return{month:m,ca,achatsHT,depTTC,valeurStock,resultat,foodCost,score,docs,orderOpen,caEst}}
async function fetchData(){const res=await fetch(API_URL,{cache:"no-store"});if(!res.ok)throw new Error("HTTP "+res.status);const data=await res.json();if(!data.success)throw new Error(data.error||"API error");return data}
function renderKpis(data,m){const cards=[[T[LANG].k_ca,formatMAD(m.ca),T[LANG].period+" "+(m.month||"-")],[T[LANG].k_est,formatMAD(m.caEst),T[LANG].k_est],[T[LANG].k_res,formatMAD(m.resultat),T[LANG].k_res,m.resultat>=0?"success":"danger"],[T[LANG].k_stock,formatMAD(m.valeurStock),T[LANG].k_stock],[T[LANG].k_food,formatPercent(m.foodCost),T[LANG].k_food,m.foodCost>.4?"danger":"success"],[T[LANG].k_docs,String(m.docs),T[LANG].k_docs]];return cards.map(c=>`<div class="card kpi"><div class="name">${c[0]}</div><div class="value" style="${c[3]==="danger"?"color:var(--danger)":c[3]==="success"?"color:var(--success)":""}">${c[1]}</div><div class="hint">${c[2]}</div></div>`).join("")}
function renderInsights(data,m){const raw=data.analyses||[];const line=raw.find(x=>String(x.Langue||"").toUpperCase()===(LANG==="ar"?"AR":"FR"));let txt=line?line.Analyse:"";if(!txt){txt=LANG==="ar"?`رقم معاملات الشهر هو ${formatMAD(m.ca)}. قيمة المخزون الحالية ${formatMAD(m.valeurStock)}. هناك ${m.orderOpen} طلب شراء مفتوح.`:`CA du mois : ${formatMAD(m.ca)}. Valeur stock : ${formatMAD(m.valeurStock)}. ${m.orderOpen} bon(s) de commande ouvert(s).`}return`<div class="insight"><div class="icon ${m.score>=70?'success':m.score>=50?'warning':'danger'}">✓</div><div><strong>${T[LANG].analysis}</strong><p>${String(txt).replace(/\n/g,"<br>")}</p></div></div>`}
function renderPayments(data,m){const ventesM=rowsInMonth(data.ventes||[],"Date",m.month);const items=[[LANG==="ar"?"نقداً":"Espèces",sumRows(ventesM,["CA_Especes","CA espèces"])],[LANG==="ar"?"بطاقة":"Carte",sumRows(ventesM,["CA_Carte","CA carte"])],[LANG==="ar"?"توصيل":"Livraison",sumRows(ventesM,["CA_Livraison","CA livraison"])]].filter(x=>x[1]>0);if(!items.length)return`<div class="empty">${T[LANG].noData}</div>`;return items.map(x=>{const pct=m.ca?x[1]/m.ca*100:0;return`<div style="margin:14px 0"><div style="display:flex;justify-content:space-between;font-weight:900;color:#5d6c66"><span>${x[0]}</span><span>${formatMAD(x[1])} · ${Math.round(pct)}%</span></div><div class="bar"><span style="width:${Math.min(100,pct)}%"></span></div></div>`}).join("")}
function renderActions(data){const rows=data.actions||[];if(!rows.length)return`<div class="empty">${T[LANG].noData}</div>`;return`<table><thead><tr><th>${T[LANG].priority}</th><th>${T[LANG].action}</th><th>${T[LANG].status}</th></tr></thead><tbody>`+rows.map(r=>{const pr=textVal(r,["Priorite","priority","Priorité"],"Normale"),ac=textVal(r,["Action","action"],""),st=textVal(r,["Statut","status"],""),why=textVal(r,["Pourquoi","why"],"");return`<tr><td>${renderBadge(pr)}</td><td><strong>${translateActionText(ac)}</strong><br><span style="color:var(--muted)">${translateActionText(why)}</span></td><td>${renderBadge(st)}</td></tr>`}).join("")+`</tbody></table>`}
function renderStock(data){const rows=data.stock||[];if(!rows.length)return`<div class="empty">${T[LANG].noData}</div>`;return`<table><thead><tr><th>${T[LANG].product}</th><th>${T[LANG].theo}</th><th>${T[LANG].cover}</th><th>${T[LANG].status}</th></tr></thead><tbody>`+rows.slice(0,12).map(r=>{const status=textVal(r,["Statut_Stock","status"],"");return`<tr><td>${textVal(r,["Produit","product"])}</td><td>${safeNumber(textVal(r,["Stock_Theorique","stockTheorique"]))}</td><td>${safeNumber(textVal(r,["Couverture_Jours","couvertureJours"]))}</td><td>${renderBadge(status)}</td></tr>`}).join("")+`</tbody></table>`}
function renderExpenses(data,m){const rows=rowsInMonth(data.depenses||[],"Date",m.month);const groups=data.depensesByCategory||groupSum(rows,["Type_Depense","Type dépense","category"],["Montant_TTC","Montant TTC","value"]);if(!groups.length)return`<div class="empty">${T[LANG].noData}</div>`;return`<table><thead><tr><th>${T[LANG].category}</th><th>${T[LANG].amount}</th></tr></thead><tbody>`+groups.slice(0,8).map(g=>`<tr><td>${g.label||g.Category||g.categorie}</td><td>${formatMAD(g.value||g.Montant||g.montant)}</td></tr>`).join("")+`</tbody></table>`}
function renderSuppliers(data,m){const rows=rowsInMonth(data.factures||[],"Date",m.month);let groups=data.fournisseurs||groupSum(rows,["Fournisseur","supplier"],["Montant_TTC","Montant TTC"]);if(!groups.length&&(data.bonsCommande||[]).length)groups=groupSum(data.bonsCommande,["Fournisseur"],["Montant_Estime_TTC"]);if(!groups.length)return`<div class="empty">${T[LANG].noData}</div>`;return`<table><thead><tr><th>${T[LANG].supplier}</th><th>${T[LANG].amount}</th></tr></thead><tbody>`+groups.slice(0,8).map(g=>`<tr><td>${g.label||g.Fournisseur||g.supplier}</td><td>${formatMAD(g.value||g.Total||g.total||g.Montant_Estime_TTC)}</td></tr>`).join("")+`</tbody></table>`}
function renderPurchaseOrders(data){const rows=data.bonsCommande||data.purchaseOrders||[];if(!rows.length)return`<div class="empty">${T[LANG].noData}</div>`;return`<table><thead><tr><th>${T[LANG].supplier}</th><th>${T[LANG].amount}</th><th>${T[LANG].status}</th></tr></thead><tbody>`+rows.slice(0,8).map(r=>`<tr><td>${textVal(r,["Fournisseur","supplier"])}</td><td>${formatMAD(textVal(r,["Montant_Estime_TTC","amount","Montant"]))}</td><td>${renderBadge(textVal(r,["Statut_Commande","status","Statut"]))}</td></tr>`).join("")+`</tbody></table>`}
function renderDashboard(data){DATA=data;const tr=T[LANG];document.documentElement.lang=LANG==="ar"?"ar":"fr";document.documentElement.dir=LANG==="ar"?"rtl":"ltr";document.body.dir=LANG==="ar"?"rtl":"ltr";const m=computeMetrics(data);document.getElementById("app").className="";document.getElementById("app").innerHTML=`<header class="topbar"><div class="brand"><div class="logo">R</div><div><h1>${tr.brand}</h1><p>${tr.sub}</p></div></div><div class="switch"><button class="${LANG==="fr"?"active":""}" onclick="setLang('fr')">Français</button><button class="${LANG==="ar"?"active":""}" onclick="setLang('ar')">العربية</button></div><div class="updated"><strong>${tr.updated}</strong>${fmtDate(data.generatedAt||new Date())}</div></header><main class="wrap"><section class="hero"><div><div class="eyebrow">${tr.eye}</div><h2>${tr.title}</h2><p>${tr.subtitle}</p></div><div class="scorebox"><div class="label">${tr.score}</div><div class="score">${m.score}/100</div><div class="scoremsg">${scoreMessage(m.score)}</div></div></section><section class="kpis">${renderKpis(data,m)}</section><section class="grid"><div class="card"><div class="section-title"><h3>${tr.analysis}</h3><span>${tr.natural}</span></div>${renderInsights(data,m)}</div><div class="card"><div class="section-title"><h3>${tr.payments}</h3><span>${formatMAD(m.ca)}</span></div>${renderPayments(data,m)}</div></section><section class="grid" style="margin-top:20px"><div class="card"><div class="section-title"><h3>${tr.actions}</h3></div>${renderActions(data)}</div><div class="card"><div class="section-title"><h3>${tr.stock}</h3></div>${renderStock(data)}</div></section><section class="grid-3"><div class="card"><div class="section-title"><h3>${tr.expenses}</h3></div>${renderExpenses(data,m)}</div><div class="card"><div class="section-title"><h3>${tr.suppliers}</h3></div>${renderSuppliers(data,m)}</div><div class="card"><div class="section-title"><h3>${tr.orders}</h3></div>${renderPurchaseOrders(data)}</div></section><footer class="footer">${tr.footer}</footer></main>`}
function setLang(lang){LANG=lang;localStorage.setItem("rp360_lang",lang);if(DATA)renderDashboard(DATA)}
(async function init(){try{const data=await fetchData();renderDashboard(data)}catch(err){document.getElementById("app").className="wrap";document.getElementById("app").innerHTML=`<div class="error"><strong>${T[LANG].loadErr}</strong><br>${err.message}</div>`}})();
</script>
</body>
</html>
